<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Playwrite+DE+SAS:wght@100..400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../images/logoo.png">
    <!-- CSS from parent folder -->
    <link rel="stylesheet" href="../styles.css">

    <title>Apply for Space Exploration</title>

</head>

<body>

    <section class="applyPage">

        <h1>Apply to Join the Mission</h1>

        <form class="applyForm">
            <div>
            <label>Name</label>
            <input type="text" required>
            </div>

            <div>
                <label>Email</label>
                <input type="email" required>
            </div>

            <div>
                <label>
                    Why do you want to explore space?
                </label>
            </div>

            <textarea rows="5"></textarea>

            <div>
                <button type="submit" class="btn">
                    Submit Application
                </button>
            </div>

        </form>
        <a href="../index.html" class="btn backBtn">← Back to Home</a>

        <br>

        <a href="../index.html">
            
        </a>

    </section>

</body>

</html>
